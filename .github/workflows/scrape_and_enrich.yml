name: Automated B2B Data Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# AUTORIZZAZIONE SCRITTURA DEFINITIVA: Consente al bot di salvare i dati nel repo
permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Data Pipeline
      env:
        PYTHONPATH: .
      run: python src/main.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/dataset_b2b_italy.csv
        git diff-index --quiet HEAD || git commit -m "Automated update: Added new B2B leads [skip ci]"
        git push
